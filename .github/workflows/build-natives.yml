# ci.yml's workflow_run trigger references this workflow by its display name.
# If you rename it, update ci.yml or the CI re-trigger silently stops firing.
name: 2dog Build Natives

on:
  workflow_dispatch:
    inputs:
      create_release:
        description: 'Create GitHub release'
        type: boolean
        default: true
      force:
        description: 'Force rebuild even if release exists'
        type: boolean
        default: false
  push:
    branches: [main]
    paths:
      - 'godot'
      - 'build-godot.py'

permissions:
  contents: write

jobs:
  # Quick check: compute submodule hash and see if a release already exists.
  preflight:
    name: Preflight
    runs-on: blacksmith-4vcpu-ubuntu-2404
    outputs:
      submodule-hash: ${{ steps.hash.outputs.hash }}
      skip: ${{ steps.check-release.outputs.skip }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Compute submodule hash
        id: hash
        run: |
          HASH=$(git ls-tree HEAD godot | awk '{print $3}' | cut -c1-7)
          echo "hash=$HASH" >> $GITHUB_OUTPUT
          echo "Godot submodule hash: $HASH"

      - name: Check if release already exists
        id: check-release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="godot-${{ steps.hash.outputs.hash }}"
          FORCE="${{ github.event.inputs.force }}"
          if [ "$FORCE" != "true" ] && gh release view "$TAG" --repo "$GITHUB_REPOSITORY" > /dev/null 2>&1; then
            echo "Release $TAG already exists — skipping builds"
            echo "skip=true" >> $GITHUB_OUTPUT
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

  # GodotSharp assemblies are platform-independent — only need to build once on Linux.
  # This job also produces the Linux editor binary needed for project import in CI.
  build-godotsharp:
    name: Build GodotSharp
    needs: preflight
    if: needs.preflight.outputs.skip != 'true'
    runs-on: blacksmith-8vcpu-ubuntu-2404

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          submodules: recursive

      - name: Setup Python
        uses: actions/setup-python@v7
        with:
          python-version: '3.12'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install scons rich

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            pkg-config \
            libx11-dev \
            libxcursor-dev \
            libxinerama-dev \
            libgl1-mesa-dev \
            libglu1-mesa-dev \
            libasound2-dev \
            libpulse-dev \
            libudev-dev \
            libxi-dev \
            libxrandr-dev \
            libwayland-dev

      - name: Cache SCons
        uses: actions/cache@v6
        with:
          path: |
            godot/.scons_cache
            ~/.cache/scons
          key: godotsharp-linux-${{ needs.preflight.outputs.submodule-hash }}
          restore-keys: |
            godotsharp-linux-

      - name: Build editor + GodotSharp assemblies
        run: |
          python build-godot.py \
            --no-library \
            --debug-symbols no \
            --dev-build no \
            --cache-path godot/.scons_cache

      - name: Upload GodotSharp assemblies
        uses: actions/upload-artifact@v7
        with:
          name: godotsharp
          path: godot/bin/GodotSharp/
          retention-days: 7

      - name: Upload GodotSharp NuGet packages
        uses: actions/upload-artifact@v7
        with:
          name: godotsharp-nupkgs
          path: godot/bin/GodotSharp/Tools/nupkgs/
          retention-days: 7

      - name: Upload source generators
        uses: actions/upload-artifact@v7
        with:
          name: godot-source-generators
          path: godot/modules/mono/editor/Godot.NET.Sdk/Godot.SourceGenerators/bin/Release/netstandard2.0/Godot.SourceGenerators.dll
          retention-days: 7

      - name: Upload Linux editor binary
        uses: actions/upload-artifact@v7
        with:
          name: godot-editor-linux-x64
          path: godot/bin/godot.linuxbsd.editor.x86_64.executable.mono
          retention-days: 7

  # Build native libgodot libraries for all platform/variant combinations.
  # The artifact name libgodot-{rid}-{target} is the contract with ci.yml's
  # staging step; the zip attached to the release contains the library under
  # its original Godot file name (e.g. godot.windows.editor.x86_64.shared_library.dll).
  build-natives:
    name: Build libgodot-${{ matrix.rid }}-${{ matrix.target }}
    needs: preflight
    if: needs.preflight.outputs.skip != 'true'
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        target: [template_release, template_debug, editor]
        platform: [linuxbsd, windows, macos]
        include:
          - platform: linuxbsd
            runner: blacksmith-8vcpu-ubuntu-2404
            arch: x86_64
            rid: linux-x64
            lib_ext: so
          - platform: windows
            runner: blacksmith-8vcpu-windows-2025
            arch: x86_64
            rid: win-x64
            lib_ext: dll
          - platform: macos
            runner: blacksmith-12vcpu-macos-latest
            arch: arm64
            rid: osx-arm64
            lib_ext: dylib
          # Web (browser-wasm) static libraries: no editor target, built with
          # the emscripten version pinned in Directory.Build.props (must match
          # the .NET browser-wasm runtime pack the consumers publish with).
          - platform: web
            target: template_release
            runner: blacksmith-8vcpu-ubuntu-2404
            arch: wasm32
            rid: browser-wasm
            lib_ext: a
          - platform: web
            target: template_debug
            runner: blacksmith-8vcpu-ubuntu-2404
            arch: wasm32
            rid: browser-wasm
            lib_ext: a

    # From Godot upstream CI (windows_builds.yml): cache SCons's MSVC
    # environment detection, and keep Python console output UTF-8 clean on
    # the Windows runners (build-godot.py uses rich).
    env:
      SCONS_CACHE_MSVC_CONFIG: true
      PYTHONIOENCODING: utf8

    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          submodules: recursive

      - name: Setup Python
        uses: actions/setup-python@v7
        with:
          python-version: '3.12'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install scons rich

      # Linux-specific dependencies
      - name: Install Linux dependencies
        if: matrix.platform == 'linuxbsd'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            pkg-config \
            libx11-dev \
            libxcursor-dev \
            libxinerama-dev \
            libgl1-mesa-dev \
            libglu1-mesa-dev \
            libasound2-dev \
            libpulse-dev \
            libudev-dev \
            libxi-dev \
            libxrandr-dev \
            libwayland-dev

      - name: Install Vulkan SDK (macOS)
        if: matrix.platform == 'macos'
        run: sh godot/misc/scripts/install_vulkan_sdk_macos.sh

      # Web: emscripten pinned to the version the .NET browser-wasm runtime
      # pack was built with (the static libgodot.a is linked into
      # dotnet.native.wasm at consumer publish time, so they must match).
      - name: Read pinned emscripten version
        if: matrix.platform == 'web'
        id: emsdk-version
        run: |
          VERSION=$(sed -n 's/.*<EmscriptenVersion>\(.*\)<\/EmscriptenVersion>.*/\1/p' Directory.Build.props)
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Pinned emscripten: $VERSION"

      - name: Setup emsdk
        if: matrix.platform == 'web'
        uses: emscripten-core/setup-emsdk@v16
        with:
          version: ${{ steps.emsdk-version.outputs.version }}
          actions-cache-folder: emsdk-cache

      # Cache SCons build
      - name: Cache SCons
        uses: actions/cache@v6
        with:
          path: |
            godot/.scons_cache
            ~/.cache/scons
          key: libgodot-${{ matrix.rid }}-${{ matrix.target }}-${{ needs.preflight.outputs.submodule-hash }}
          restore-keys: |
            libgodot-${{ matrix.rid }}-${{ matrix.target }}-

      # Build using build-godot.py with platform/arch overrides
      - name: Build libgodot (${{ matrix.target }})
        run: |
          python build-godot.py \
            --platform ${{ matrix.platform }} \
            --arch ${{ matrix.arch }} \
            --target ${{ matrix.target }} \
            --no-editor \
            --no-glue \
            --dev-build no \
            --debug-symbols no \
            --scu-build yes \
            --cache-path godot/.scons_cache

      # Upload the library under its original Godot file name; the release job
      # zips each artifact directory as-is.
      - name: Upload artifact
        if: matrix.platform != 'web'
        uses: actions/upload-artifact@v7
        with:
          name: libgodot-${{ matrix.rid }}-${{ matrix.target }}
          path: godot/bin/*godot.${{ matrix.platform }}.${{ matrix.target }}.${{ matrix.arch }}.shared_library.${{ matrix.lib_ext }}
          retention-days: 7

      # Web uploads the whole payload directory (libgodot/ archive + JS glue,
      # shell/ boot files) - the contract with ci.yml's staging step and the
      # 2dog.browser-wasm packages.
      - name: Upload artifact (web payload)
        if: matrix.platform == 'web'
        uses: actions/upload-artifact@v7
        with:
          name: libgodot-${{ matrix.rid }}-${{ matrix.target }}
          path: godot/bin/web/${{ matrix.target }}/
          retention-days: 7

  # Create a GitHub release tagged godot-{hash} with all native libs + GodotSharp
  release:
    name: Create Release
    needs: [preflight, build-godotsharp, build-natives]
    if: needs.preflight.outputs.skip != 'true' && (github.event_name != 'workflow_dispatch' || github.event.inputs.create_release == 'true')
    runs-on: blacksmith-4vcpu-ubuntu-2404

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts

      - name: Prepare release assets
        run: |
          chmod +x artifacts/godot-editor-linux-x64/godot.linuxbsd.editor.x86_64.executable.mono
          mkdir -p release-assets
          # One zip per artifact, named after the artifact, with the artifact's
          # files at the zip root under their original names.
          for dir in artifacts/*/; do
            name=$(basename "$dir")
            (cd "$dir" && zip -9 -r "$GITHUB_WORKSPACE/release-assets/$name.zip" .)
          done
          echo "Release assets:"
          ls -lh release-assets/

      - name: Create Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="godot-${{ needs.preflight.outputs.submodule-hash }}"
          # Delete existing release if present (force rebuild case)
          gh release delete "$TAG" --repo "$GITHUB_REPOSITORY" --yes 2>/dev/null || true
          gh release create "$TAG" \
            --repo "$GITHUB_REPOSITORY" \
            --latest=false \
            --title "Godot Native Libraries ($TAG)" \
            --notes "$(cat <<'EOF'
          ## Native Libraries for Godot submodule ${{ needs.preflight.outputs.submodule-hash }}

          Auto-generated native library build. Used by the `ci.yml` workflow to avoid rebuilding Godot from source on every push.

          ### Included platforms
          - Linux x64 (template_release, template_debug, editor)
          - Windows x64 (template_release, template_debug, editor)
          - macOS arm64 (template_release, template_debug, editor)
          - Browser wasm32 (template_release, template_debug — static library payloads)

          ### Additional assets
          - `godotsharp.zip` — GodotSharp assemblies (platform-independent)
          - `godotsharp-nupkgs.zip` — GodotSharp NuGet packages
          - `godot-source-generators.zip` — Godot.SourceGenerators.dll
          - `godot-editor-linux-x64.zip` — Linux editor binary (for project import)
          EOF
          )" \
            release-assets/*
