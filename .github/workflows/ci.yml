name: 2dog CI

on:
  push:
    branches: ['**']
    tags: ['v*']
    paths-ignore:
      - 'docs/**'
      - '*.md'
  # No pull_request trigger: push already runs on every branch, so a PR
  # would run CI twice. Caveat: PRs from forks get no CI without it.
  workflow_run:
    # Must match build-natives.yml's display name exactly.
    workflows: ["2dog Build Natives"]
    types: [completed]
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read # jobs that need more (check-natives, deploy) declare their own

jobs:
  # Check if native libraries are available before running the full pipeline.
  # When they are missing, this job dispatches build-natives.yml itself
  # (workflow_dispatch is exempt from GitHub's anti-recursion rule for
  # GITHUB_TOKEN, same mechanism release.yml uses) and outputs ready=false so
  # downstream jobs are skipped (green badge) instead of cancelled (red badge).
  # On main, the workflow_run trigger above re-runs CI when the build finishes;
  # PR and tag runs must be re-run manually once natives exist.
  check-natives:
    name: Check Native Libraries
    if: github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success'
    runs-on: blacksmith-4vcpu-ubuntu-2404
    permissions:
      contents: read
      actions: write # dispatch build-natives.yml when natives are missing
    outputs:
      ready: ${{ steps.check.outputs.ready }}
      hash: ${{ steps.check.outputs.hash }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Check native library availability
        id: check
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          HASH=$(git ls-tree HEAD godot | awk '{print $3}' | cut -c1-7)
          echo "hash=$HASH" >> $GITHUB_OUTPUT
          echo "Godot submodule hash: $HASH"

          TAG="godot-$HASH"
          if gh release view "$TAG" --repo "$GITHUB_REPOSITORY" > /dev/null 2>&1; then
            echo "ready=true" >> $GITHUB_OUTPUT
            exit 0
          fi

          # The ref the natives should be built from: PR head branch for
          # pull_request events, otherwise the pushed branch or tag.
          REF="${GITHUB_HEAD_REF:-$GITHUB_REF_NAME}"

          # A build may already be running: push-triggered on main (submodule
          # bump) or dispatched on this ref by an earlier run of this job.
          BUILDING=$(gh run list -w build-natives.yml --json status,headBranch \
            -q "[.[] | select((.status == \"in_progress\" or .status == \"queued\") and (.headBranch == \"main\" or .headBranch == \"$REF\"))] | length")
          if [ "$BUILDING" -gt 0 ]; then
            echo "::notice::Native build in progress — skipping CI. On main it re-triggers automatically when the build completes; re-run this workflow manually for PR/tag runs."
            echo "ready=false" >> $GITHUB_OUTPUT
            exit 0
          fi

          if gh workflow run build-natives.yml --repo "$GITHUB_REPOSITORY" --ref "$REF"; then
            echo "::notice::No native build for godot submodule $HASH — dispatched the '2dog Build Natives' workflow on '$REF'. On main, CI re-triggers automatically when it completes; re-run this workflow manually for PR/tag runs."
            echo "ready=false" >> $GITHUB_OUTPUT
          else
            echo "::error::No native build for godot submodule $HASH and dispatching the native build failed (fork PR?). Run the '2dog Build Natives' workflow manually."
            exit 1
          fi

  # Download pre-built native libraries, stage godot/bin, and pack all
  # NuGet packages for the test jobs. The game project is imported by the
  # test jobs themselves via the automatic MSBuild import step.
  pack:
    name: Pack NuGet Packages
    needs: [check-natives]
    if: needs.check-natives.outputs.ready == 'true'
    runs-on: blacksmith-4vcpu-ubuntu-2404

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Setup .NET
        uses: actions/setup-dotnet@v6
        with:
          dotnet-version: '10.0.x'

      # Release tags must point at a commit whose Directory.Build.props composes the
      # same version, otherwise the packed binaries would be labeled with a stale
      # version (see v4.7.0.26, which shipped 4.7.0.25 binaries).
      # Ref check only (no event check): tag builds arrive either as a direct tag
      # push or as a workflow_dispatch on the tag from release.yml.
      - name: Verify tag matches TwoDogVersion
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          TAG_VERSION="${GITHUB_REF#refs/tags/v}"
          PROPS_VERSION="$(dotnet msbuild twodog.engine/twodog.engine.csproj -getProperty:TwoDogVersion | tr -d '[:space:]')"
          echo "Tag version: $TAG_VERSION"
          echo "Props version: $PROPS_VERSION"
          if [[ "$TAG_VERSION" != "$PROPS_VERSION" ]]; then
            echo "::error::Tag v$TAG_VERSION does not match TwoDogVersion $PROPS_VERSION from Directory.Build.props." \
                 "Tag the commit that bumps <TwoDogRevision>, or use the Release workflow."
            exit 1
          fi

      # The platform packages are versioned by <NativesRevision>, which must be
      # bumped whenever the godot submodule changes. If it isn't, deploy's
      # skip-duplicate push silently keeps the previously published natives.
      # Each platform package records the submodule commit it was built from in
      # its repository metadata (see platforms/Directory.Build.props) — compare
      # the published package's commit with ours and fail on a mismatch.
      - name: Verify NativesVersion is not already published from different natives
        run: |
          NATIVES_VERSION="$(dotnet msbuild twodog.engine/twodog.engine.csproj -getProperty:NativesVersion | tr -d '[:space:]')"
          # NuGet normalizes away a trailing .0 fourth segment (4.7.0.0 -> 4.7.0).
          NORMALIZED="$(echo "$NATIVES_VERSION" | sed -E 's/^([0-9]+\.[0-9]+\.[0-9]+)\.0$/\1/')"
          CURRENT_COMMIT="$(git rev-parse HEAD:godot)"
          echo "NativesVersion: $NORMALIZED, godot submodule: $CURRENT_COMMIT"

          # Probe one representative platform package; all of them are packed
          # and pushed together. Must be a variant package (.debug/.release/
          # .editor) — the meta packages use a custom NuspecFile and carry no
          # repository stamp.
          URL="https://api.nuget.org/v3-flatcontainer/2dog.win-x64.debug/$NORMALIZED/2dog.win-x64.debug.$NORMALIZED.nupkg"
          if ! curl -fsSL -o /tmp/published-natives.nupkg "$URL"; then
            echo "Natives $NORMALIZED not on nuget.org yet — nothing to collide with."
            exit 0
          fi

          # Note: packages published before the stamping target existed carry
          # the SDK's automatic SourceLink stamp (the 2dog repo commit, not the
          # submodule) — those hit the mismatch path below, which is the right
          # verdict: they cannot be confirmed to contain the current natives.
          PUBLISHED_COMMIT="$(unzip -p /tmp/published-natives.nupkg '*.nuspec' | sed -n 's/.*commit="\([0-9a-f]*\)".*/\1/p' | head -1)"
          if [ -z "$PUBLISHED_COMMIT" ]; then
            echo "::warning::Natives $NORMALIZED is on nuget.org without any recorded commit. Cannot verify — if the submodule changed since that release, bump <NativesRevision>."
          elif [ "$PUBLISHED_COMMIT" != "$CURRENT_COMMIT" ]; then
            echo "::error::Natives $NORMALIZED is already on nuget.org and its recorded source commit ${PUBLISHED_COMMIT:0:7} does not match the current godot submodule ${CURRENT_COMMIT:0:7}. Deploy would skip-duplicate and keep the stale natives. Bump <NativesRevision> in Directory.Build.props."
            exit 1
          else
            echo "Natives $NORMALIZED already published from the same godot commit — repack is identical, skip-duplicate is harmless."
          fi

      - name: Download native libraries from release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="godot-${{ needs.check-natives.outputs.hash }}"
          echo "Looking for release: $TAG"
          mkdir -p release-assets
          gh release download "$TAG" --repo "$GITHUB_REPOSITORY" --dir release-assets
          echo "Downloaded assets:"
          ls -lh release-assets/

      - name: Stage godot/bin directory
        run: |
          # The godot submodule is not checked out here, so the target tree
          # must exist before unzip (-d only creates the last path component).
          mkdir -p godot/bin/GodotSharp/Tools/nupkgs \
                   godot/modules/mono/editor/Godot.NET.Sdk/Godot.SourceGenerators/bin/Release/netstandard2.0

          unzip -o release-assets/godotsharp.zip -d godot/bin/GodotSharp/
          unzip -o release-assets/godotsharp-nupkgs.zip -d godot/bin/GodotSharp/Tools/nupkgs/
          unzip -o release-assets/godot-source-generators.zip -d godot/modules/mono/editor/Godot.NET.Sdk/Godot.SourceGenerators/bin/Release/netstandard2.0/
          unzip -o release-assets/godot-editor-linux-x64.zip -d godot/bin/
          chmod +x godot/bin/godot.linuxbsd.editor.x86_64.executable.mono

          # Native library zips contain the libraries under their original
          # Godot file names (e.g. godot.windows.editor.x86_64.shared_library.dll).
          # Web (browser-wasm) zips contain the whole payload directory and are
          # staged under godot/bin/web/<target>/ (the 2dog.browser-wasm pack
          # location and the local-fallback path of its consumer targets).
          for z in release-assets/libgodot-*.zip; do
            base=$(basename "$z" .zip)
            case "$base" in
              libgodot-browser-wasm-*)
                target="${base#libgodot-browser-wasm-}"
                mkdir -p "godot/bin/web/$target"
                unzip -o "$z" -d "godot/bin/web/$target/"
                ;;
              *)
                unzip -o "$z" -d godot/bin/
                ;;
            esac
          done

          # Releases created before the zips carried the Godot file names hold a
          # single generically named library each — fail early with a pointer
          # instead of letting the platform pack fail cryptically.
          for f in godot/bin/libgodot.so godot/bin/libgodot.dll godot/bin/libgodot.dylib; do
            if [ -e "$f" ]; then
              echo "::error::Release godot-${{ needs.check-natives.outputs.hash }} uses the old asset layout (generic ${f##*/} inside the native zips). Re-run the '2dog Build Natives' workflow with force=true to regenerate it."
              exit 1
            fi
          done

          echo "Staged godot/bin contents:"
          find godot/bin -type f | sort
          echo ""
          echo "Source generators:"
          find godot/modules -type f | sort

      - name: Pack platform NuGet packages
        run: |
          mkdir -p packages
          dotnet pack platforms/ -p:ForcePackAllPlatforms=true

      - name: Build twodog library (all configs)
        run: |
          dotnet build twodog.engine -c Debug
          dotnet build twodog.engine -c Release
          dotnet build twodog.engine -c Editor

      - name: Pack twodog packages
        run: |
          dotnet pack twodog.engine
          dotnet pack twodog.xunit
          dotnet pack twodog

      - name: Upload godot-bin artifact
        uses: actions/upload-artifact@v7
        with:
          name: godot-bin
          path: |
            godot/bin/
            godot/modules/mono/editor/Godot.NET.Sdk/Godot.SourceGenerators/bin/Release/netstandard2.0/
          retention-days: 3

      - name: Upload NuGet packages
        uses: actions/upload-artifact@v7
        with:
          name: nuget-packages
          path: packages/
          retention-days: 7

  # Run tests on each platform.
  test:
    name: Test (${{ matrix.name }})
    needs: [pack]
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-x64
            runner: blacksmith-4vcpu-ubuntu-2404
          - name: win-x64
            runner: blacksmith-4vcpu-windows-2025
          - name: osx-arm64
            runner: blacksmith-6vcpu-macos-latest

    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Setup .NET
        uses: actions/setup-dotnet@v6
        with:
          dotnet-version: '10.0.x'

      - name: Download godot-bin artifact
        uses: actions/download-artifact@v8
        with:
          name: godot-bin
          path: godot

      - name: Download NuGet packages
        uses: actions/download-artifact@v8
        with:
          name: nuget-packages
          path: packages

      # 2dog.tests.slnf excludes demo.web: its browser-wasm RuntimeIdentifier
      # makes restore demand the (hefty) wasm-tools workload, which only the
      # web-smoke job needs — and installs.
      - name: Restore
        run: dotnet restore 2dog.tests.slnf

      - name: Test (Debug)
        run: dotnet test 2dog.tests.slnf -c Debug --no-restore

      - name: Test (Release)
        run: dotnet test 2dog.tests.slnf -c Release --no-restore

      - name: Test (Editor)
        run: dotnet test 2dog.tests.slnf -c Editor --no-restore

  # Publish the demo desktop host the way an end user does (Release, RID) and
  # run the result headless. Regression guard: the engine used to load the
  # game assembly only from .godot/mono/temp/bin/Debug, so any Release-only
  # build or publish silently bound no C# script classes (masked in the test
  # jobs by the Debug run that precedes them in the same workspace).
  desktop-smoke:
    name: Desktop Smoke (${{ matrix.name }})
    needs: [pack]
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-x64
            runner: blacksmith-4vcpu-ubuntu-2404
            rid: linux-x64
            exe: demo.2dog
          - name: win-x64
            runner: blacksmith-4vcpu-windows-2025
            rid: win-x64
            exe: demo.2dog.exe
          - name: osx-arm64
            runner: blacksmith-6vcpu-macos-latest
            rid: osx-arm64
            exe: demo.2dog

    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Setup .NET
        uses: actions/setup-dotnet@v6
        with:
          dotnet-version: '10.0.x'

      - name: Download godot-bin artifact
        uses: actions/download-artifact@v8
        with:
          name: godot-bin
          path: godot

      - name: Download NuGet packages
        uses: actions/download-artifact@v8
        with:
          name: nuget-packages
          path: packages

      # The publish triggers the automatic Godot import, which runs the
      # in-process import helper (discovered at twodog.import/bin/Release in
      # source checkouts).
      - name: Build import helper
        run: dotnet build twodog.import -c Release

      - name: Publish demo desktop host (Release, RID)
        run: dotnet publish demo/demo.2dog -c Release -r ${{ matrix.rid }}

      # RID-less publish is the most natural user command and takes its own
      # native-copy path in the platform targets (host-OS gated instead of
      # RID gated) - cover it separately.
      - name: Publish demo desktop host (Release, no RID)
        run: dotnet publish demo/demo.2dog -c Release

      # The engine must load the game assembly from the publish output itself.
      # Delete the game project's own build outputs so a regression back to
      # .godot/mono/temp/bin probing cannot be masked by them.
      - name: Remove game project build outputs
        shell: bash
        run: rm -rf demo/.godot/mono/temp/bin

      - name: Run published host (headless, RID)
        id: run
        shell: bash
        run: |
          set +e
          demo/demo.2dog/bin/Release/net10.0/${{ matrix.rid }}/publish/${{ matrix.exe }} \
            --headless --quit-after 120 2>&1 | tee smoke.log
          status=${PIPESTATUS[0]}
          echo "Host exit code: $status"
          echo "status=$status" >> "$GITHUB_OUTPUT"

      - name: Run published host (headless, no RID)
        id: run_norid
        shell: bash
        run: |
          set +e
          demo/demo.2dog/bin/Release/net10.0/publish/${{ matrix.exe }} \
            --headless --quit-after 120 2>&1 | tee smoke-norid.log
          status=${PIPESTATUS[0]}
          echo "Host exit code: $status"
          echo "status=$status" >> "$GITHUB_OUTPUT"

      # Surface the .ips crash report for the known macOS teardown abort
      # (libgodot exit-time static destructors; see the twodog.Engine static
      # ctor comment) so it can be root-caused in the fork.
      - name: Dump crash report (macOS)
        if: runner.os == 'macOS' && (steps.run.outputs.status != '0' || steps.run_norid.outputs.status != '0')
        shell: bash
        run: |
          # ReportCrash writes the .ips shortly after the abort
          for i in $(seq 1 12); do
            ls ~/Library/Logs/DiagnosticReports/demo.2dog-*.ips > /dev/null 2>&1 && break
            sleep 5
          done
          cat ~/Library/Logs/DiagnosticReports/demo.2dog-*.ips 2>/dev/null \
            || echo "no crash report found"

      # Deterministic backtrace: rerun the aborting binary under lldb and dump
      # all threads at the abort. This is the data source for fixing the
      # teardown crash in the fork.
      - name: Rerun under lldb for backtrace (macOS)
        if: runner.os == 'macOS' && (steps.run.outputs.status != '0' || steps.run_norid.outputs.status != '0')
        shell: bash
        run: |
          lldb -b \
            -o run \
            -o "bt all" \
            -o quit \
            -- demo/demo.2dog/bin/Release/net10.0/${{ matrix.rid }}/publish/${{ matrix.exe }} \
               --headless --quit-after 120 2>&1 | tail -150 || true

      - name: Assert scripts bound
        shell: bash
        run: |
          fail=0
          check() {
            local log="$1" status="$2" label="$3"
            if grep -q "Cannot instantiate C# script" "$log"; then
              echo "::error::[$label] The published host could not bind C# script classes"
              fail=1
            fi
            if ! grep -q "2DOG_CSHARP_SCRIPT_SMOKE_PASSED" "$log"; then
              echo "::error::[$label] C# script smoke marker missing (SpinningCube did not bind)"
              fail=1
            fi
            if ! grep -q "2DOG_GDSCRIPT_LINKER_SMOKE_PASSED" "$log"; then
              echo "::error::[$label] GDScript linker smoke marker missing"
              fail=1
            fi
            if [ "$status" != "0" ]; then
              echo "::error::[$label] Host exited with code $status"
              fail=1
            fi
          }
          check smoke.log "${{ steps.run.outputs.status }}" "rid"
          check smoke-norid.log "${{ steps.run_norid.outputs.status }}" "no-rid"
          exit $fail

  # Publish the web demo end-to-end: statically links the web libgodot.a into
  # dotnet.native.wasm via the wasm-tools workload and asserts the app bundle
  # is complete. Consumers never install emsdk — the workload ships the
  # matching emscripten (see <EmscriptenVersion> in Directory.Build.props).
  web-smoke:
    name: Web Smoke (browser-wasm publish)
    needs: [pack]
    runs-on: blacksmith-8vcpu-ubuntu-2404
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Setup .NET
        uses: actions/setup-dotnet@v6
        with:
          dotnet-version: '10.0.x'

      - name: Setup Node.js
        uses: actions/setup-node@v7
        with:
          node-version: '24'
          package-manager-cache: false

      - name: Install wasm-tools workload
        run: dotnet workload install wasm-tools

      - name: Download godot-bin artifact
        uses: actions/download-artifact@v8
        with:
          name: godot-bin
          path: godot

      - name: Download NuGet packages
        uses: actions/download-artifact@v8
        with:
          name: nuget-packages
          path: packages

      - name: Make Linux editor executable
        run: chmod +x godot/bin/godot.linuxbsd.editor.x86_64.executable.mono || true

      # The publish exports the demo Godot project as godot.pck via the
      # in-process import helper, discovered at twodog.import/bin/Release in
      # source checkouts (twodog.engine/build/2dog.engine.targets). Must come after the
      # godot-bin download: the helper references GodotSharp assemblies from
      # godot/bin.
      - name: Build import helper
        run: dotnet build twodog.import -c Release

      # Runs from the repo root on purpose: the root global.json pins the
      # wasm-capable SDK band, so the from-root publish flow the docs promise
      # stays covered.
      - name: Publish demo.web
        run: dotnet publish demo/demo.web -c Release

      - name: Verify app bundle
        run: |
          BUNDLE=demo/demo.web/AppBundle
          for f in "$BUNDLE/godot.wasm" "$BUNDLE/godot.pck" "$BUNDLE/godot.js" "$BUNDLE/index.html" "$BUNDLE/_framework/dotnet.js"; do
            if [ ! -f "$f" ]; then
              echo "::error::Missing $f in the published app bundle"
              ls -R "$BUNDLE" || true
              exit 1
            fi
          done
          # godot.wasm contains the statically linked engine — sanity floor.
          SIZE=$(stat -c%s "$BUNDLE/godot.wasm")
          echo "godot.wasm size: $SIZE bytes"
          if [ "$SIZE" -lt 20000000 ]; then
            echo "::error::godot.wasm is suspiciously small ($SIZE bytes) — engine may be missing from the link"
            exit 1
          fi
          echo "Web app bundle OK"

      # Execute the linked app in a real browser. The game assembly runs the
      # shared GodotApiSmoke probe and marks the DOM only after native API,
      # resource, codec, server, scene, generated C# script, and GDScript-only
      # engine-module calls succeed.
      - name: Run browser API smoke
        run: |
          BUNDLE=demo/demo.web/AppBundle
          CHROME=$(command -v google-chrome || command -v chromium || command -v chromium-browser || true)
          if [ -z "$CHROME" ]; then
            echo "::error::No Chrome/Chromium executable is available on the runner"
            exit 1
          fi

          python3 -m http.server 8000 --bind 127.0.0.1 --directory "$BUNDLE" > /tmp/2dog-web-server.log 2>&1 &
          SERVER_PID=$!
          cleanup() {
            if [ -n "${CHROME_PID:-}" ]; then
              kill "$CHROME_PID" 2>/dev/null || true
            fi
            kill "$SERVER_PID" 2>/dev/null || true
          }
          trap cleanup EXIT

          for attempt in $(seq 1 30); do
            if curl --fail --silent http://127.0.0.1:8000/index.html > /dev/null; then
              break
            fi
            sleep 1
          done

          "$CHROME" \
            --headless=new \
            --no-sandbox \
            --use-gl=angle \
            --use-angle=swiftshader-webgl \
            --enable-unsafe-swiftshader \
            --disable-dev-shm-usage \
            --enable-logging=stderr \
            --remote-debugging-address=127.0.0.1 \
            --remote-debugging-port=9222 \
            '--remote-allow-origins=*' \
            "--user-data-dir=${RUNNER_TEMP}/2dog-chrome" \
            http://127.0.0.1:8000/index.html \
            > /tmp/2dog-browser.log 2>&1 &
          CHROME_PID=$!

          set +e
          timeout 130s node .github/scripts/wait-for-browser-smoke.mjs \
            http://127.0.0.1:8000/index.html 120000 9222
          SMOKE_STATUS=$?
          set -e

          cat /tmp/2dog-web-server.log
          cat /tmp/2dog-browser.log

          if [ "$SMOKE_STATUS" -ne 0 ]; then
            echo "::error::The browser app did not complete the Godot API smoke probe"
            exit "$SMOKE_STATUS"
          fi

          echo "Web runtime API smoke OK"

  # Deploy to NuGet and create GitHub release when running on a version tag —
  # either pushed directly or dispatched on the tag by release.yml (tags pushed
  # with GITHUB_TOKEN don't fire push events, so release.yml dispatches instead).
  # Uses NuGet Trusted Publishing (OIDC) — no long-lived API key is stored.
  deploy:
    name: Deploy to NuGet
    # web-smoke gates deploy because the 2dog.browser-wasm packages it
    # exercises are among the packages being published; desktop-smoke gates it
    # because it is the only check that runs a Release-only publish.
    needs: [test, desktop-smoke, web-smoke]
    runs-on: blacksmith-4vcpu-ubuntu-2404
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write # required to create the GitHub Release for the tag
      id-token: write # required to request the GitHub OIDC token for Trusted Publishing

    steps:
      - name: Download NuGet packages
        uses: actions/download-artifact@v8
        with:
          name: nuget-packages
          path: packages

      # Defense in depth: the pack job already verified the tag against the props
      # file, but refuse to publish unless the artifact really contains packages
      # at the tag's version.
      - name: Verify packages match tag
        run: |
          TAG_VERSION="${GITHUB_REF#refs/tags/v}"
          for pkg in "2dog" "2dog.engine"; do
            if [[ ! -f "packages/${pkg}.${TAG_VERSION}.nupkg" ]]; then
              echo "::error::packages/ does not contain ${pkg}.${TAG_VERSION}.nupkg — refusing to publish."
              echo "Artifact contents:"
              ls -lh packages/
              exit 1
            fi
          done

      - name: Setup .NET
        uses: actions/setup-dotnet@v6
        with:
          dotnet-version: '10.0.x'

      # Exchange the GitHub OIDC token for a short-lived NuGet API key via the
      # Trusted Publishing policy configured on nuget.org. `NUGET_USER` is a repo
      # secret holding the nuget.org account that owns the policy.
      - name: NuGet login (Trusted Publishing)
        id: nuget-login
        uses: NuGet/login@v1
        with:
          user: ${{ secrets.NUGET_USER }}

      - name: Push to NuGet
        env:
          NUGET_API_KEY: ${{ steps.nuget-login.outputs.NUGET_API_KEY }}
        run: |
          for pkg in packages/*.nupkg; do
            [[ "$pkg" == *.snupkg ]] && continue
            echo "Pushing $pkg..."
            dotnet nuget push "$pkg" \
              --source https://api.nuget.org/v3/index.json \
              --api-key "$NUGET_API_KEY" \
              --skip-duplicate
          done

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          gh release create "$TAG" \
            --repo "$GITHUB_REPOSITORY" \
            --title "$TAG" \
            --generate-notes \
            packages/*.nupkg packages/*.snupkg
