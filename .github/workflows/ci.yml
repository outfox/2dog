name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
    paths-ignore:
      - 'docs/**'
      - '*.md'
  pull_request:
    branches: [main]
    paths-ignore:
      - 'docs/**'
      - '*.md'
  workflow_run:
    workflows: ["libgodot"]
    types: [completed]
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  # Check if native libraries are available before running the full pipeline.
  # When they are missing, this job dispatches the libgodot workflow itself
  # (workflow_dispatch is exempt from GitHub's anti-recursion rule for
  # GITHUB_TOKEN, same mechanism release.yml uses) and outputs ready=false so
  # downstream jobs are skipped (green badge) instead of cancelled (red badge).
  # On main, the workflow_run trigger above re-runs CI when the build finishes;
  # PR and tag runs must be re-run manually once natives exist.
  check-natives:
    name: Check Native Libraries
    if: github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: write # dispatch build-natives.yml when natives are missing
    outputs:
      ready: ${{ steps.check.outputs.ready }}
      hash: ${{ steps.check.outputs.hash }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Check native library availability
        id: check
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          HASH=$(git ls-tree HEAD godot | awk '{print $3}' | cut -c1-7)
          echo "hash=$HASH" >> $GITHUB_OUTPUT
          echo "Godot submodule hash: $HASH"

          TAG="godot-$HASH"
          if gh release view "$TAG" --repo "$GITHUB_REPOSITORY" > /dev/null 2>&1; then
            echo "ready=true" >> $GITHUB_OUTPUT
            exit 0
          fi

          # The ref the natives should be built from: PR head branch for
          # pull_request events, otherwise the pushed branch or tag.
          REF="${GITHUB_HEAD_REF:-$GITHUB_REF_NAME}"

          # A build may already be running: push-triggered on main (submodule
          # bump) or dispatched on this ref by an earlier run of this job.
          BUILDING=$(gh run list -w build-natives.yml --json status,headBranch \
            -q "[.[] | select((.status == \"in_progress\" or .status == \"queued\") and (.headBranch == \"main\" or .headBranch == \"$REF\"))] | length")
          if [ "$BUILDING" -gt 0 ]; then
            echo "::notice::Native build in progress — skipping CI. On main it re-triggers automatically when the build completes; re-run this workflow manually for PR/tag runs."
            echo "ready=false" >> $GITHUB_OUTPUT
            exit 0
          fi

          if gh workflow run build-natives.yml --repo "$GITHUB_REPOSITORY" --ref "$REF"; then
            echo "::notice::No native build for godot submodule $HASH — dispatched the libgodot workflow on '$REF'. On main, CI re-triggers automatically when it completes; re-run this workflow manually for PR/tag runs."
            echo "ready=false" >> $GITHUB_OUTPUT
          else
            echo "::error::No native build for godot submodule $HASH and dispatching the libgodot workflow failed (fork PR?). Run the 'libgodot' workflow manually."
            exit 1
          fi

  # Download pre-built native libraries, stage godot/bin, and pack all NuGet packages.
  pack:
    name: Pack NuGet Packages
    needs: [check-natives]
    if: needs.check-natives.outputs.ready == 'true'
    runs-on: blacksmith-4vcpu-ubuntu-2404

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '8.0.x'

      # Release tags must point at a commit whose Directory.Build.props composes the
      # same version, otherwise the packed binaries would be labeled with a stale
      # version (see v4.7.0.26, which shipped 4.7.0.25 binaries).
      # Ref check only (no event check): tag builds arrive either as a direct tag
      # push or as a workflow_dispatch on the tag from release.yml.
      - name: Verify tag matches TwoDogVersion
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          TAG_VERSION="${GITHUB_REF#refs/tags/v}"
          PROPS_VERSION="$(dotnet msbuild twodog/twodog.csproj -getProperty:TwoDogVersion | tr -d '[:space:]')"
          echo "Tag version: $TAG_VERSION"
          echo "Props version: $PROPS_VERSION"
          if [[ "$TAG_VERSION" != "$PROPS_VERSION" ]]; then
            echo "::error::Tag v$TAG_VERSION does not match TwoDogVersion $PROPS_VERSION from Directory.Build.props." \
                 "Tag the commit that bumps <TwoDogRevision>, or use the Release workflow."
            exit 1
          fi

      - name: Download native libraries from release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="godot-${{ needs.check-natives.outputs.hash }}"
          echo "Looking for release: $TAG"
          mkdir -p release-assets
          gh release download "$TAG" --repo "$GITHUB_REPOSITORY" --dir release-assets
          echo "Downloaded assets:"
          ls -lh release-assets/

      - name: Stage godot/bin directory
        run: |
          mkdir -p godot/bin/GodotSharp/Tools/nupkgs
          mkdir -p godot/modules/mono/editor/Godot.NET.Sdk/Godot.SourceGenerators/bin/Release/netstandard2.0

          # Unpack GodotSharp assemblies
          unzip -o release-assets/godotsharp.zip -d godot/bin/GodotSharp/

          # Unpack GodotSharp NuGet packages
          unzip -o release-assets/godotsharp-nupkgs.zip -d godot/bin/GodotSharp/Tools/nupkgs/

          # Unpack source generators
          unzip -o release-assets/godot-source-generators.zip -d godot/modules/mono/editor/Godot.NET.Sdk/Godot.SourceGenerators/bin/Release/netstandard2.0/

          # Unpack Linux editor binary
          unzip -o release-assets/godot-editor-linux-x64.zip -d godot/bin/
          chmod +x godot/bin/godot.linuxbsd.editor.x86_64.executable.mono || true

          # Unpack native libraries with their original Godot naming convention
          # Linux x64
          unzip -o release-assets/libgodot-linux-x64-template_release.zip -d /tmp/native
          mv /tmp/native/libgodot.so godot/bin/libgodot.linuxbsd.template_release.x86_64.shared_library.so
          rm -rf /tmp/native

          unzip -o release-assets/libgodot-linux-x64-template_debug.zip -d /tmp/native
          mv /tmp/native/libgodot.so godot/bin/libgodot.linuxbsd.template_debug.x86_64.shared_library.so
          rm -rf /tmp/native

          unzip -o release-assets/libgodot-linux-x64-editor.zip -d /tmp/native
          mv /tmp/native/libgodot.so godot/bin/libgodot.linuxbsd.editor.x86_64.shared_library.so
          rm -rf /tmp/native

          # Windows x64
          unzip -o release-assets/libgodot-win-x64-template_release.zip -d /tmp/native
          mv /tmp/native/libgodot.dll godot/bin/godot.windows.template_release.x86_64.shared_library.dll
          rm -rf /tmp/native

          unzip -o release-assets/libgodot-win-x64-template_debug.zip -d /tmp/native
          mv /tmp/native/libgodot.dll godot/bin/godot.windows.template_debug.x86_64.shared_library.dll
          rm -rf /tmp/native

          unzip -o release-assets/libgodot-win-x64-editor.zip -d /tmp/native
          mv /tmp/native/libgodot.dll godot/bin/godot.windows.editor.x86_64.shared_library.dll
          rm -rf /tmp/native

          # macOS arm64
          unzip -o release-assets/libgodot-osx-arm64-template_release.zip -d /tmp/native
          mv /tmp/native/libgodot.dylib godot/bin/libgodot.macos.template_release.arm64.shared_library.dylib
          rm -rf /tmp/native

          unzip -o release-assets/libgodot-osx-arm64-template_debug.zip -d /tmp/native
          mv /tmp/native/libgodot.dylib godot/bin/libgodot.macos.template_debug.arm64.shared_library.dylib
          rm -rf /tmp/native

          unzip -o release-assets/libgodot-osx-arm64-editor.zip -d /tmp/native
          mv /tmp/native/libgodot.dylib godot/bin/libgodot.macos.editor.arm64.shared_library.dylib
          rm -rf /tmp/native

          echo "Staged godot/bin contents:"
          find godot/bin -type f | sort
          echo ""
          echo "Source generators:"
          find godot/modules -type f | sort

      - name: Ensure local NuGet source directories exist
        run: mkdir -p packages

      - name: Pack platform NuGet packages
        run: dotnet pack platforms/ -p:ForcePackAllPlatforms=true

      - name: Build twodog library (all configs)
        run: |
          dotnet build twodog -c Debug
          dotnet build twodog -c Release
          dotnet build twodog -c Editor

      - name: Pack twodog (main package)
        run: dotnet pack twodog

      - name: Pack twodog.xunit
        run: dotnet pack twodog.xunit

      - name: Pack templates
        run: dotnet pack templates

      - name: List packages
        run: ls -lh packages/

      - name: Upload godot-bin artifact
        uses: actions/upload-artifact@v7
        with:
          name: godot-bin
          path: |
            godot/bin/
            godot/modules/mono/editor/Godot.NET.Sdk/Godot.SourceGenerators/bin/Release/netstandard2.0/
          retention-days: 3

      - name: Upload NuGet packages
        uses: actions/upload-artifact@v7
        with:
          name: nuget-packages
          path: packages/
          retention-days: 7

  # Import Godot project resources using the Linux editor binary.
  # Runs on ubuntu-latest which has the system libraries Godot needs (X11, OpenGL, etc.).
  import-game:
    name: Import Game Project
    needs: [pack]
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '8.0.x'

      - name: Download godot-bin artifact
        uses: actions/download-artifact@v8
        with:
          name: godot-bin
          path: godot

      - name: Import game project
        run: |
          chmod +x godot/bin/godot.linuxbsd.editor.x86_64.executable.mono
          python3 import-project.py ./game

      - name: Upload imported game data
        uses: actions/upload-artifact@v7
        with:
          name: game-imported
          path: game/.godot/
          include-hidden-files: true
          retention-days: 3

  # Run tests on each platform.
  test:
    name: Test (${{ matrix.name }})
    needs: [pack, import-game]
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-x64
            runner: ubuntu-latest
          - name: win-x64
            runner: blacksmith-4vcpu-windows-2025
          - name: osx-arm64
            runner: macos-15

    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '8.0.x'

      - name: Download godot-bin artifact
        uses: actions/download-artifact@v8
        with:
          name: godot-bin
          path: godot

      - name: Download imported game data
        uses: actions/download-artifact@v8
        with:
          name: game-imported
          path: game/.godot

      - name: Download NuGet packages
        uses: actions/download-artifact@v8
        with:
          name: nuget-packages
          path: packages

      - name: Restore
        run: dotnet restore

      - name: Test (Debug)
        run: dotnet test -c Debug --no-restore

      - name: Test (Release)
        run: dotnet test -c Release --no-restore

      - name: Test (Editor)
        run: dotnet test -c Editor --no-restore

  # Deploy to NuGet and create GitHub release when running on a version tag —
  # either pushed directly or dispatched on the tag by release.yml (tags pushed
  # with GITHUB_TOKEN don't fire push events, so release.yml dispatches instead).
  # Uses NuGet Trusted Publishing (OIDC) — no long-lived API key is stored.
  deploy:
    name: Deploy to NuGet
    needs: [test]
    runs-on: blacksmith-4vcpu-ubuntu-2404
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write # required to create the GitHub Release for the tag
      id-token: write # required to request the GitHub OIDC token for Trusted Publishing

    steps:
      - name: Download NuGet packages
        uses: actions/download-artifact@v8
        with:
          name: nuget-packages
          path: packages

      # Defense in depth: the pack job already verified the tag against the props
      # file, but refuse to publish unless the artifact really contains packages
      # at the tag's version.
      - name: Verify packages match tag
        run: |
          TAG_VERSION="${GITHUB_REF#refs/tags/v}"
          if [[ ! -f "packages/2dog.${TAG_VERSION}.nupkg" ]]; then
            echo "::error::packages/ does not contain 2dog.${TAG_VERSION}.nupkg — refusing to publish."
            echo "Artifact contents:"
            ls -lh packages/
            exit 1
          fi

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '8.0.x'

      # Exchange the GitHub OIDC token for a short-lived NuGet API key via the
      # Trusted Publishing policy configured on nuget.org. `NUGET_USER` is a repo
      # secret holding the nuget.org account that owns the policy.
      - name: NuGet login (Trusted Publishing)
        id: nuget-login
        uses: NuGet/login@v1
        with:
          user: ${{ secrets.NUGET_USER }}

      - name: Push to NuGet
        env:
          NUGET_API_KEY: ${{ steps.nuget-login.outputs.NUGET_API_KEY }}
        run: |
          for pkg in packages/*.nupkg; do
            [[ "$pkg" == *.snupkg ]] && continue
            echo "Pushing $pkg..."
            dotnet nuget push "$pkg" \
              --source https://api.nuget.org/v3/index.json \
              --api-key "$NUGET_API_KEY" \
              --skip-duplicate
          done

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          gh release create "$TAG" \
            --repo "$GITHUB_REPOSITORY" \
            --title "$TAG" \
            --generate-notes \
            packages/*.nupkg packages/*.snupkg
